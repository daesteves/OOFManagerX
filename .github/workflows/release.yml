name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  APP_PROJECT: 'src/OOFManagerX.App/OOFManagerX.App.csproj'
  TEST_PROJECT: 'tests/OOFManagerX.Core.Tests/OOFManagerX.Core.Tests.csproj'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        runtime: [win-x64, win-arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.APP_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.APP_PROJECT }} -c Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT }} -c Release --verbosity normal

      - name: Publish self-contained EXE
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet publish ${{ env.APP_PROJECT }} `
            -c Release `
            -r ${{ matrix.runtime }} `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:DebugType=none `
            -o publish/${{ matrix.runtime }}

      - name: Rename EXE
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if (Test-Path "publish/${{ matrix.runtime }}/OOFManagerX.App.exe") {
            Rename-Item "publish/${{ matrix.runtime }}/OOFManagerX.App.exe" "OOFManagerX.exe"
          }

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $files = Get-ChildItem "publish/${{ matrix.runtime }}" -Include "OOFManagerX.exe","*.dll" -File
          Compress-Archive -Path $files.FullName -DestinationPath "publish/OOFManagerX-${{ matrix.runtime }}.zip"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: OOFManagerX-${{ matrix.runtime }}
          path: publish/OOFManagerX-${{ matrix.runtime }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/OOFManagerX-*.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'pre') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
