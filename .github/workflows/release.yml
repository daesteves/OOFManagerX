name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  APP_PROJECT: 'src/OOFManagerX.App/OOFManagerX.App.csproj'
  TEST_PROJECT: 'tests/OOFManagerX.Core.Tests/OOFManagerX.Core.Tests.csproj'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.APP_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.APP_PROJECT }} -c Release --no-restore

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT }} -c Release --verbosity normal

      - name: Publish self-contained EXE
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet publish ${{ env.APP_PROJECT }} `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:DebugType=none `
            -o publish/win-x64

      - name: Rename EXE
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if (Test-Path "publish/win-x64/OOFManagerX.App.exe") {
            Rename-Item "publish/win-x64/OOFManagerX.App.exe" "OOFManagerX.exe"
          }

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $files = Get-ChildItem "publish/win-x64" -Include "OOFManagerX.exe","*.dll" -File
          Compress-Archive -Path $files.FullName -DestinationPath "publish/OOFManagerX-win-x64.zip"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: publish/OOFManagerX-win-x64.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'pre') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
